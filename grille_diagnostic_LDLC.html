<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Diagnostic Merchandising — LDLC</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Diagnostic LDLC">
<meta name="theme-color" content="#3B2A1A">
<link rel="manifest" href="manifest.json">
<style>
  :root {
    --brown: #3B2A1A;
    --brown-light: #6B4C35;
    --cream: #F7F4EF;
    --cream-dark: #EDE8DF;
    --border: #D8D0C4;
    --text: #2C2C2A;
    --text-muted: #7A7570;
    --ok: #3B6D11;
    --ok-bg: #EAF3DE;
    --ok-border: #97C459;
    --warn: #854F0B;
    --warn-bg: #FAEEDA;
    --warn-border: #EF9F27;
    --bad: #A32D2D;
    --bad-bg: #FCEBEB;
    --bad-border: #E24B4A;
    --radius: 10px;
    --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--cream); color: var(--text); font-size: 15px; line-height: 1.5; }

  header { background: var(--brown); color: white; padding: 18px 20px 14px; position: sticky; top: 0; z-index: 100; }
  header h1 { font-size: 17px; font-weight: 600; letter-spacing: 0.02em; }
  header p { font-size: 12px; opacity: 0.65; margin-top: 2px; }

  .container { max-width: 720px; margin: 0 auto; padding: 16px 14px 100px; }

  .info-card { background: white; border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .info-grid label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 4px; }
  .info-grid input, .info-grid select { width: 100%; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 9px 11px; font-size: 14px; color: var(--text); background: var(--cream); font-family: inherit; }
  .info-grid input:focus, .info-grid select:focus { outline: none; border-color: var(--brown-light); background: white; }

  .score-banner { background: white; border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .score-main { font-size: 28px; font-weight: 700; color: var(--brown); min-width: 56px; }
  .score-bar-wrap { flex: 1; min-width: 120px; }
  .score-bar-track { height: 7px; background: var(--cream-dark); border-radius: 4px; overflow: hidden; margin-bottom: 6px; }
  .score-bar-fill { height: 7px; border-radius: 4px; transition: width 0.4s ease, background 0.3s; width: 0%; background: var(--text-muted); }
  .score-chips { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip { font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
  .chip.ok { background: var(--ok-bg); color: var(--ok); }
  .chip.warn { background: var(--warn-bg); color: var(--warn); }
  .chip.bad { background: var(--bad-bg); color: var(--bad); }

  .legend { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 14px; }
  .leg { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-muted); }
  .leg-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

  .pillar { background: white; border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; }
  .pillar-header { display: flex; align-items: center; justify-content: space-between; padding: 13px 15px; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; }
  .pillar-header-left { display: flex; align-items: center; gap: 10px; }
  .pillar-badge { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
  .pillar-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .pillar-pct { font-size: 12px; font-weight: 600; padding: 3px 9px; border-radius: 20px; }
  .pillar-chevron { font-size: 18px; color: var(--text-muted); transition: transform 0.2s; }
  .pillar-chevron.open { transform: rotate(180deg); }
  .pillar-body { padding: 0 15px 12px; display: none; }
  .pillar-body.open { display: block; }

  .criterion { padding: 9px 0; border-top: 1px solid var(--cream-dark); }
  .criterion:first-child { border-top: none; }
  .criterion-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .criterion-text { font-size: 13px; color: var(--text-muted); line-height: 1.4; flex: 1; }
  .btn-row { display: flex; gap: 5px; flex-shrink: 0; }
  .score-btn { width: 34px; height: 34px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--cream); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
  .score-btn:active { transform: scale(0.93); }
  .score-btn.ok { background: var(--ok-bg); border-color: var(--ok-border); }
  .score-btn.warn { background: var(--warn-bg); border-color: var(--warn-border); }
  .score-btn.bad { background: var(--bad-bg); border-color: var(--bad-border); }
  .criterion-comment { width: 100%; margin-top: 6px; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 7px 10px; font-size: 12px; color: var(--text); background: white; font-family: inherit; resize: none; min-height: 36px; display: none; }
  .criterion-comment.visible { display: block; }
  .criterion-comment:focus { outline: none; border-color: var(--brown-light); }
  .criterion-comment::placeholder { color: var(--text-muted); }

  .pillar-note { width: 100%; margin-top: 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 9px 11px; font-size: 13px; color: var(--text); background: var(--cream); font-family: inherit; resize: none; min-height: 44px; }
  .pillar-note:focus { outline: none; border-color: var(--brown-light); background: white; }

  .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid var(--border); padding: 12px 14px; display: flex; gap: 10px; z-index: 100; max-width: 720px; margin: 0 auto; }
  .btn-primary { flex: 1; background: var(--brown); color: white; border: none; border-radius: var(--radius-sm); padding: 13px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; -webkit-tap-highlight-color: transparent; }
  .btn-primary:active { background: var(--brown-light); }
  .btn-secondary { background: white; color: var(--text-muted); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 13px 16px; font-size: 14px; cursor: pointer; font-family: inherit; -webkit-tap-highlight-color: transparent; }
  .btn-secondary:active { background: var(--cream); }

  .plan-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; overflow-y: auto; padding: 20px 14px; }
  .plan-overlay.open { display: block; }
  .plan-card { background: white; border-radius: var(--radius); max-width: 680px; margin: 0 auto; overflow: hidden; }
  .plan-header { background: var(--brown); color: white; padding: 16px 18px; display: flex; justify-content: space-between; align-items: center; }
  .plan-header h2 { font-size: 16px; font-weight: 600; }
  .plan-close { background: none; border: none; color: white; font-size: 22px; cursor: pointer; padding: 0 4px; line-height: 1; }
  .plan-body { padding: 18px; }
  .plan-loading { text-align: center; padding: 40px 20px; }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--cream-dark); border-top-color: var(--brown); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .plan-content { font-size: 14px; line-height: 1.7; color: var(--text); white-space: pre-wrap; }
  .plan-actions { display: flex; gap: 10px; padding: 14px 18px; border-top: 1px solid var(--border); }

  @media (max-width: 480px) {
    .info-grid { grid-template-columns: 1fr; }
    .score-main { font-size: 24px; }
    .bottom-bar { flex-direction: column; }
  }
</style>
</head>
<body>

<header>
  <h1>Diagnostic Merchandising LDLC</h1>
  <p>Boutiques volontaires & boutiques désignées</p>
</header>

<div class="container">

  <div class="info-card">
    <div class="info-grid">
      <div>
        <label>Magasin</label>
        <input type="text" id="f-magasin" placeholder="Nom ou code magasin">
      </div>
      <div>
        <label>Visiteur / Auditeur</label>
        <input type="text" id="f-visiteur" placeholder="Prénom Nom">
      </div>
      <div>
        <label>Date de visite</label>
        <input type="date" id="f-date">
      </div>
      <div>
        <label>Type de visite</label>
        <select id="f-type">
          <option value="">— Sélectionner —</option>
          <option>Diagnostic initial</option>
          <option>Visite de suivi</option>
          <option>Contrôle post-accompagnement</option>
        </select>
      </div>
    </div>
  </div>

  <div class="score-banner">
    <div class="score-main" id="score-pct">—</div>
    <div class="score-bar-wrap">
      <div class="score-bar-track"><div class="score-bar-fill" id="score-bar"></div></div>
      <div class="score-chips">
        <span class="chip ok" id="cnt-ok">0 conformes</span>
        <span class="chip warn" id="cnt-warn">0 à améliorer</span>
        <span class="chip bad" id="cnt-bad">0 non conformes</span>
      </div>
    </div>
  </div>

  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:var(--ok)"></div>Conforme</div>
    <div class="leg"><div class="leg-dot" style="background:var(--warn)"></div>À améliorer</div>
    <div class="leg"><div class="leg-dot" style="background:var(--bad)"></div>Non conforme</div>
  </div>

  <div id="pillars"></div>

</div>

<div class="bottom-bar">
  <button class="btn-primary" onclick="openPlan()">Générer le plan d'actions →</button>
  <button class="btn-secondary" onclick="resetAll()">↺</button>
</div>

<div class="plan-overlay" id="plan-overlay">
  <div class="plan-card">
    <div class="plan-header">
      <h2>Plan d'actions — <span id="plan-magasin">Magasin</span></h2>
      <button class="plan-close" onclick="closePlan()">×</button>
    </div>
    <div class="plan-body" id="plan-body">
      <div class="plan-loading" id="plan-loading">
        <div class="spinner"></div>
        <p style="color:var(--text-muted);font-size:13px">Génération du plan d'actions en cours…</p>
      </div>
      <div class="plan-content" id="plan-content" style="display:none"></div>
    </div>
    <div class="plan-actions">
      <button class="btn-primary" onclick="copyPlan()">Copier le plan</button>
      <button class="btn-secondary" onclick="closePlan()">Fermer</button>
    </div>
  </div>
</div>

<script>
const PILLARS = [
  { id:'p1', num:'01', title:'Première impression & extérieur', color:'#185FA5', bg:'#E6F1FB',
    criteria:['Façade, enseigne et vitrine propres et attractives','Visuels chartés corporate propres et à jour','Horaires affichés, lisibles et à jour','Visuels vitrine à jour (pas de campagne obsolète)','Entrée dégagée, accueil visible dès le seuil'] },
  { id:'p2', num:'02', title:'Propreté & état général', color:'#3B6D11', bg:'#EAF3DE',
    criteria:['Sols, meubles et plafonds propres','Produits expo sans poussière ni emballage abîmé','Câbles et branchements non visibles sur les linéaires','Éclairage fonctionnel (pas d\'ampoules hors service)','Mobilier en bon état, stable et cohérent','Zone de réserve et caisses ordonnées'] },
  { id:'p3', num:'03', title:'Concept & identité de marque', color:'#854F0B', bg:'#FAEEDA',
    criteria:['Éléments identitaires LDLC présents et en bon état','Respect du plan de masse et des préconisations LDLC','Aucun élément parasite ou non conforme à la charte','Visibilité de l\'espace atelier et accessible par le client'] },
  { id:'p4', num:'04', title:'Parcours client & organisation des univers', color:'#993C1D', bg:'#FAECE7',
    criteria:['Séparation claire Gaming / Bureautique / autres','Enchaînement logique et fluide des univers','Signalisation des univers lisible et cohérente','Allées larges, accessibilité PMR respectée','Zone caisse identifiée et organisée','Nouveaux univers ou concepts à implanter identifiés'] },
  { id:'p5', num:'05', title:'Merchandising produit', color:'#534AB7', bg:'#EEEDFE',
    criteria:['Structure meuble adaptée aux typologies produits','Facing respecté, densité linéaire optimale','Pas de ruptures visibles (trous en linéaire)','Étiquetage prix complet, lisible et à jour','Produits "dormants" identifiés et traités','Produits expo fonctionnels, alarmés, présentés correctement','État de l\'accastillage et des éléments merch (plexi, bandes de rives...)'] },
  { id:'p6', num:'06', title:'Communication & expérience client', color:'#993556', bg:'#FBEAF0',
    criteria:['Signalétique ILV/PLV propre, sans visuels obsolètes','Offres promo et mises en avant clairement visibles','Services LDLC mis en avant (garantie 5 ans, financement...) — grille tarifaire à jour, lisible et accessible','Affichage légal conforme et à jour','Communication digitale (écrans) fonctionnelle','Équipe identifiable (tenue, badge)','Qualité de l\'accueil et du conseil observée'] }
];

const state = {};
const comments = {};
const notes = {};
const open = {};
PILLARS.forEach(p => {
  p.criteria.forEach((_,i) => {
    state[p.id+'_'+i] = null;
    comments[p.id+'_'+i] = '';
  });
  notes[p.id] = '';
  open[p.id] = false;
});
open['p1'] = true;

document.getElementById('f-date').value = new Date().toISOString().split('T')[0];

function render() {
  const container = document.getElementById('pillars');
  container.innerHTML = '';
  PILLARS.forEach(p => {
    const scores = p.criteria.map((_,i) => state[p.id+'_'+i]);
    const ok = scores.filter(s=>s==='ok').length;
    const evaluated = scores.filter(s=>s!==null).length;
    const pct = evaluated > 0 ? Math.round(ok/p.criteria.length*100) : null;
    const badgeBg = pct===null ? '#F1EFE8' : pct>=70 ? '#EAF3DE' : pct>=40 ? '#FAEEDA' : '#FCEBEB';
    const badgeColor = pct===null ? '#888780' : pct>=70 ? '#3B6D11' : pct>=40 ? '#854F0B' : '#A32D2D';
    const isOpen = open[p.id];

    const div = document.createElement('div');
    div.className = 'pillar';
    div.innerHTML = `
      <div class="pillar-header" onclick="toggle('${p.id}')">
        <div class="pillar-header-left">
          <div class="pillar-badge" style="background:${p.bg};color:${p.color}">${p.num}</div>
          <div class="pillar-name">${p.title}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="pillar-pct" style="background:${badgeBg};color:${badgeColor}">${pct!==null ? pct+'%' : evaluated+'/'+p.criteria.length}</span>
          <span class="pillar-chevron ${isOpen?'open':''}">›</span>
        </div>
      </div>
      <div class="pillar-body ${isOpen?'open':''}">
        ${p.criteria.map((c,i) => {
          const v = state[p.id+'_'+i];
          const cmt = comments[p.id+'_'+i];
          const showComment = v === 'warn' || v === 'bad' || cmt;
          return `<div class="criterion">
            <div class="criterion-top">
              <div class="criterion-text">${c}</div>
              <div class="btn-row">
                <button class="score-btn ${v==='ok'?'ok':''}" onclick="setScore('${p.id}',${i},'ok')" title="Conforme">✓</button>
                <button class="score-btn ${v==='warn'?'warn':''}" onclick="setScore('${p.id}',${i},'warn')" title="À améliorer">~</button>
                <button class="score-btn ${v==='bad'?'bad':''}" onclick="setScore('${p.id}',${i},'bad')" title="Non conforme">✕</button>
              </div>
            </div>
            <textarea class="criterion-comment ${showComment?'visible':''}" placeholder="Commentaire…" onchange="comments['${p.id+'_'+i}']=this.value" id="cmt-${p.id}-${i}">${cmt}</textarea>
          </div>`;
        }).join('')}
        <textarea class="pillar-note" placeholder="Observations…" onchange="notes['${p.id}']=this.value">${notes[p.id]}</textarea>
      </div>`;
    container.appendChild(div);
  });
  updateScore();
}

function toggle(id) { open[id] = !open[id]; render(); }

function setScore(pid, idx, val) {
  const k = pid+'_'+idx;
  state[k] = state[k]===val ? null : val;
  render();
}

function updateScore() {
  const all = Object.values(state);
  const ok = all.filter(s=>s==='ok').length;
  const warn = all.filter(s=>s==='warn').length;
  const bad = all.filter(s=>s==='bad').length;
  const evaluated = all.filter(s=>s!==null).length;
  const pct = evaluated > 0 ? Math.round(ok/all.length*100) : null;

  const el = document.getElementById('score-pct');
  el.textContent = pct!==null ? pct+'%' : '—';
  el.style.color = pct===null ? 'var(--brown)' : pct>=70 ? 'var(--ok)' : pct>=40 ? 'var(--warn)' : 'var(--bad)';

  const bar = document.getElementById('score-bar');
  bar.style.width = (pct||0)+'%';
  bar.style.background = pct===null ? 'var(--text-muted)' : pct>=70 ? 'var(--ok)' : pct>=40 ? 'var(--warn)' : 'var(--bad)';

  document.getElementById('cnt-ok').textContent = ok+' conforme'+(ok>1?'s':'');
  document.getElementById('cnt-warn').textContent = warn+' à améliorer';
  document.getElementById('cnt-bad').textContent = bad+' non conforme'+(bad>1?'s':'');
}

function resetAll() {
  if (!confirm('Réinitialiser toute la grille ?')) return;
  Object.keys(state).forEach(k => state[k]=null);
  Object.keys(comments).forEach(k => comments[k]='');
  PILLARS.forEach(p => notes[p.id]='');
  document.getElementById('f-magasin').value='';
  document.getElementById('f-visiteur').value='';
  document.getElementById('f-date').value=new Date().toISOString().split('T')[0];
  document.getElementById('f-type').value='';
  render();
}

function buildPrompt() {
  const magasin = document.getElementById('f-magasin').value || 'Non renseigné';
  const visiteur = document.getElementById('f-visiteur').value || 'Non renseigné';
  const date = document.getElementById('f-date').value || 'Non renseignée';
  const type = document.getElementById('f-type').value || 'Non renseigné';
  const all = Object.values(state);
  const ok = all.filter(s=>s==='ok').length;
  const warn = all.filter(s=>s==='warn').length;
  const bad = all.filter(s=>s==='bad').length;
  const evaluated = all.filter(s=>s!==null).length;
  const pct = evaluated > 0 ? Math.round(ok/all.length*100) : null;

  let details = '';
  PILLARS.forEach(p => {
    const issues = [];
    p.criteria.forEach((c,i) => {
      const v = state[p.id+'_'+i];
      const cmt = comments[p.id+'_'+i];
      if (v==='warn') issues.push('⚠️ À améliorer : '+c+(cmt?' → '+cmt:''));
      if (v==='bad') issues.push('❌ Non conforme : '+c+(cmt?' → '+cmt:''));
    });
    if (issues.length > 0) details += '\n\n'+p.num+' — '+p.title+':\n'+issues.join('\n');
    if (notes[p.id]) details += '\nNote terrain : '+notes[p.id];
  });

  return `Tu es un expert merchandising retail. Voici les résultats du diagnostic merchandising LDLC pour le magasin "${magasin}", visité le ${date} par ${visiteur} (${type}).

Score global : ${pct!==null ? pct+'%' : 'non calculé'} — Conformes : ${ok}, À améliorer : ${warn}, Non conformes : ${bad}.

Points négatifs identifiés :${details || '\nAucun point négatif renseigné.'}

Génère un plan d'actions prioritaires structuré et opérationnel. Pour chaque point identifié, indique :
- La priorité : URGENTE (à corriger sous 48h) / IMPORTANTE (sous 2 semaines) / À PLANIFIER (sous 1 mois)
- L'action corrective concrète et précise
- Le délai de mise en œuvre suggéré
- La personne ou équipe responsable (responsable magasin / équipe terrain / direction)

Regroupe les actions par pilier. Termine par un résumé des 3 actions les plus prioritaires.`;
}

async function openPlan() {
  const overlay = document.getElementById('plan-overlay');
  const magasin = document.getElementById('f-magasin').value || 'Magasin';
  document.getElementById('plan-magasin').textContent = magasin;
  document.getElementById('plan-loading').style.display = 'block';
  document.getElementById('plan-content').style.display = 'none';
  document.getElementById('plan-content').textContent = '';
  overlay.classList.add('open');

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages: [{ role: 'user', content: buildPrompt() }]
      })
    });
    const data = await response.json();
    const text = data.content && data.content[0] ? data.content[0].text : 'Erreur lors de la génération.';
    document.getElementById('plan-loading').style.display = 'none';
    document.getElementById('plan-content').style.display = 'block';
    document.getElementById('plan-content').textContent = text;
  } catch(e) {
    document.getElementById('plan-loading').style.display = 'none';
    document.getElementById('plan-content').style.display = 'block';
    document.getElementById('plan-content').textContent = 'Erreur de connexion. Vérifie ta connexion internet et réessaie.';
  }
}

function closePlan() { document.getElementById('plan-overlay').classList.remove('open'); }

function copyPlan() {
  const text = document.getElementById('plan-content').textContent;
  navigator.clipboard.writeText(text).then(() => alert('Plan copié dans le presse-papier !')).catch(() => alert('Copie non disponible sur cet appareil.'));
}

render();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
